[system]
version = 1.0.0
name = CHUNK OS
author = "Cloves Nascimento — CNGSM"

[memory]
ram_limit_mb = 1536
eviction_policy = importance
eviction_check_interval_ms = 100
min_free_pages = 64

[prefetch]
lookahead = 2
min_confidence = 0.3
adaptive = true
history_size = 1000

[kv_cache]
compression = hybrid
window_size = 1024
sparsity_ratio = 0.1

[dma]
channels = 4
page_size = 262144
timeout_us = 10000

[npu]
virtual_memory_size_gb = 32
page_fault_handler = sigsegv
auto_prefetch = true
