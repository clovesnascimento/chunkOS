# CHUNK OS Configuration File
# CNGSM — Cloves Nascimento

[system]
version = 1.0.0
name = CHUNK OS
author = "Cloves Nascimento — Arquiteto de Ecossistemas Cognitivos"

[memory]
ram_limit_mb = 1536
eviction_policy = importance
# Opções: lru, lfu, importance, distance_aware

[prefetch]
lookahead = 2
min_confidence = 0.3
adaptative = true

[kv_cache]
compression = hybrid
# Opções: none, topk, window, hybrid
window_size = 1024
sparsity_ratio = 0.1

[dma]
channels = 4
page_size = 262144
timeout_us = 10000

[logging]
level = info
# Opções: debug, info, warning, error
file = /chunk/logs/chunk.log

[monitoring]
enabled = true
interval_seconds = 1
